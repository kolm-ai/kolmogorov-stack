# kolm deploy — docker-compose (vllm)
# artifact: trinity-500-q4km-test
# generator: r4-v1
#
# Place your model files under ./models/trinity-500-q4km-test before `docker compose up`.
# Container expects to find the model at /models/trinity-500-q4km-test.

services:
  kolm-runtime:
    image: vllm/vllm-openai:latest
    container_name: kolm-trinity-500-q4km-test
    restart: unless-stopped
    runtime: nvidia                 # remove if you do not have NVIDIA Container Toolkit
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - VLLM_NO_USAGE_STATS=1
    command:
      - --model
      - /models/trinity-500-q4km-test
      - --port
      - "8000"
      - --host
      - "0.0.0.0"
      - --served-model-name
      - "trinity-500-q4km-test"
    ports:
      - "8000:8000"
    volumes:
      - ./models/trinity-500-q4km-test:/models/trinity-500-q4km-test:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---- Optional NGINX TLS terminator ----------------------------------------
  # Uncomment and fill in cert paths + server_name. Place a real nginx.conf in
  # ./nginx/nginx.conf that proxies to http://kolm-runtime:8000.
  # See docs/self-hosted-deploy-complete.md section 7 for a working example.
