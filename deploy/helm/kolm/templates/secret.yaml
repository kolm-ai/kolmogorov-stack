{{- /*
Render a Secret only when the operator did NOT supply an existing one.
Holds the receipt signing secret (root of trust for receipt verification) and
the optional legacy artifact-signing secret.
*/ -}}
{{- if not .Values.secrets.existingSecret }}
{{- if not .Values.secrets.receiptSecret }}
{{- fail "secrets.receiptSecret is required unless secrets.existingSecret is set. Generate one with: openssl rand -hex 32" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kolm.secretName" . }}
  labels:
    {{- include "kolm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.receiptSecretKey }}: {{ .Values.secrets.receiptSecret | quote }}
  {{- if .Values.secrets.artifactSecret }}
  {{ .Values.secrets.artifactSecretKey }}: {{ .Values.secrets.artifactSecret | quote }}
  {{- end }}
{{- end }}
