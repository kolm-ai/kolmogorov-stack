<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="kolm — frontier models are the compiler">
  <defs>
    <radialGradient id="glow" cx="22%" cy="28%" r="58%">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#7c8cff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="86%" cy="78%" r="40%">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#7c8cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c8cff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- top hairline -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#hairline)"/>

  <!-- layered K mark -->
  <g transform="translate(80 80)">
    <rect x="0" y="0" width="80" height="80" rx="16" fill="none" stroke="#7c8cff" stroke-width="1.6" opacity="0.42"/>
    <rect x="8" y="8" width="64" height="64" rx="13" fill="none" stroke="#7c8cff" stroke-width="1.8" opacity="0.72"/>
    <rect x="16" y="16" width="48" height="48" rx="10" fill="rgba(124,140,255,0.12)" stroke="#a8b3ff" stroke-width="1.8"/>
    <path d="M 28 26 L 28 54 M 28 40 L 42 26 M 32 36 L 50 54" fill="none" stroke="#ededed" stroke-width="3.4" stroke-linecap="square"/>
  </g>
  <text x="186" y="138" fill="#ededed" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="52" font-weight="540" letter-spacing="-2.2">kolm</text>
  <text x="186" y="166" fill="#9a9da8" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" letter-spacing="3.2">THE&#160;BUILD&#160;SYSTEM&#160;FOR&#160;PRIVATE&#160;AI</text>

  <text x="80" y="324" fill="#ededed" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="78" font-weight="500" letter-spacing="-2.6">AI that knows your users.</text>
  <text x="80" y="408" fill="#7c8cff" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="78" font-weight="500" letter-spacing="-2.6">Without knowing your users.</text>

  <text x="80" y="478" fill="#9a9da8" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="22" letter-spacing="-0.4">Compile in your VPC. Run on the user's device. Never egress.</text>

  <text x="80" y="566" fill="#9a9da8" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="18" letter-spacing="3">$&#160;kolm compile&#160;&#160;·&#160;&#160;kolm serve --mcp</text>

  <!-- right-side artifact card stencil for visual depth -->
  <g transform="translate(820 270)" opacity="0.85">
    <rect x="0" y="0" width="300" height="190" rx="12" fill="#13141a" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <circle cx="20" cy="22" r="4" fill="rgba(255,255,255,0.10)"/>
    <circle cx="34" cy="22" r="4" fill="rgba(255,255,255,0.075)"/>
    <circle cx="48" cy="22" r="4" fill="rgba(255,255,255,0.05)"/>
    <text x="78" y="28" fill="#ededed" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="13">support-triage.kolm</text>
    <line x1="0" y1="48" x2="300" y2="48" stroke="rgba(255,255,255,0.06)"/>
    <text x="22" y="78" fill="#5a5c66" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="10" letter-spacing="2">K-SCORE</text>
    <text x="22" y="116" fill="#7c8cff" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',system-ui,sans-serif" font-size="42" font-weight="540" letter-spacing="-1.6">0.94</text>
    <text x="22" y="146" fill="#9a9da8" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="11" letter-spacing="0.4">38 MB · 80 ms · $0.00 / 1k</text>
    <text x="22" y="170" fill="#7ce3b6" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="11" letter-spacing="0.4">✓ HMAC verified</text>
  </g>
</svg>
