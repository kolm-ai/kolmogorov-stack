<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Train a model - kolm.ai</title>
<meta name="description" content="See your captures, inspect the holdout split and leakage checks, read the K-score delta, and start a distill - then watch it run live.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#08090A">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/kolm-2026.css">
<style>
  /* W-train distill/eval/curate panel. Colors come only from kolm-2026.css
     system tokens; local primitives mirror public/account/dashboard.html. */
  body{background:var(--room);color:var(--ink)}
  body::before,body::after{display:none}
  .mono{font-family:var(--font-mono)}
  .app{max-width:1240px;margin:0 auto;padding:clamp(28px,5vw,58px) max(22px,env(safe-area-inset-right)) 90px max(22px,env(safe-area-inset-left))}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:clamp(28px,5vw,52px)}
  .brandlink{display:inline-flex;align-items:center;gap:9px;min-height:44px;color:var(--ink);text-decoration:none;font-weight:600;letter-spacing:-.01em}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  .section-title{font-size:clamp(20px,3vw,26px);letter-spacing:-.02em;margin:34px 0 14px}
  .grid{display:grid;gap:14px}
  .grid.metrics{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
  .grid.cols2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
  .panel{background:var(--panel,#101314);border:1px solid var(--line,#1d2224);border-radius:14px;padding:18px 20px}
  .hero{grid-column:1/-1;display:flex;flex-direction:column;gap:6px;padding:26px 28px}
  .hero b{font-size:clamp(36px,7vw,60px);line-height:1;letter-spacing:-.03em;font-family:var(--font-mono)}
  .metric span{display:block;font-size:12px;color:var(--ink-mute,#8b9498);margin-bottom:8px;letter-spacing:.02em}
  .metric b{font-size:30px;font-family:var(--font-mono);letter-spacing:-.02em}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line,#1d2224)}
  .row:last-child{border-bottom:0}
  .chip{display:inline-block;font-family:var(--font-mono);font-size:12px;padding:3px 9px;border:1px solid var(--line,#1d2224);border-radius:999px;color:var(--ink-mute,#8b9498)}
  .chip.ok{color:var(--accent,#3FE5A0);border-color:var(--accent,#3FE5A0)}
  .chip.bad{color:var(--accent-dead,#e07a6e);border-color:var(--accent-dead,#c2554a)}
  .muted{color:var(--ink-mute,#8b9498)}
  .authbox{max-width:560px;margin:8vh auto;text-align:center}
  .authbox input,.fld{width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--line,#1d2224);background:#0c0f10;color:var(--ink);font-family:var(--font-mono);box-sizing:border-box}
  .authbox input{margin:14px 0}
  .btn{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 16px;border-radius:11px;text-decoration:none;font-weight:600;cursor:pointer;border:1px solid var(--line,#1d2224);background:transparent;color:var(--ink);font:inherit;font-size:14px}
  .btn--primary{background:var(--accent,#3FE5A0);color:#06140d;border-color:transparent}
  .btn--sm{min-height:34px;font-size:12px;padding:0 12px}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .banner{border:1px solid var(--line,#1d2224);border-radius:11px;padding:12px 15px;margin-bottom:16px}
  .banner.warn{border-color:var(--accent-dead,#c2554a)}
  .controls{display:grid;grid-template-columns:minmax(0,1fr) 160px auto;gap:10px;align-items:center}
  @media (max-width:640px){.controls{grid-template-columns:1fr}}
  /* K-vs-rows sparkline */
  .spark{display:block;width:100%;height:64px;margin:6px 0 4px}
  .spark path.line{fill:none;stroke:var(--accent,#3FE5A0);stroke-width:1.6}
  .spark path.area{fill:var(--accent,#3FE5A0);opacity:.10}
  .spark circle{fill:var(--accent,#3FE5A0)}
  .spark line.tgt{stroke:var(--ink-mute,#8b9498);stroke-width:1;stroke-dasharray:3 3}
  .callout{margin:6px 0 0;font-size:13px;color:var(--ink);line-height:1.5}
  .callout b{color:var(--accent,#3FE5A0)}
  /* live progress steps */
  .steps{display:grid;gap:8px;margin-top:6px}
  .step{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 11px;border:1px solid var(--line,#1d2224);border-radius:9px;background:#0c0f10}
  .step .nm{font-size:13px}
  .step .st{font-family:var(--font-mono);font-size:11px;color:var(--ink-mute,#8b9498)}
  .step[data-status="running"]{border-color:var(--accent,#3FE5A0)}
  .step[data-status="done"] .st{color:var(--accent,#3FE5A0)}
  .step[data-status="error"]{border-color:var(--accent-dead,#c2554a)}
  .step[data-status="error"] .st{color:var(--accent-dead,#e07a6e)}
  .kdelta{display:flex;align-items:baseline;gap:10px;font-family:var(--font-mono)}
  .kdelta .now{font-size:34px;letter-spacing:-.02em}
  .kdelta .vs{font-size:13px;color:var(--ink-mute,#8b9498)}
  .kdelta .up{color:var(--accent,#3FE5A0)}
  .kdelta .down{color:var(--accent-dead,#e07a6e)}
  pre{background:#0c0f10;border:1px solid var(--line,#1d2224);border-radius:11px;padding:14px;overflow:auto;font-size:12.5px;max-height:240px}
  [hidden]{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a class="brandlink" href="/"><span class="mono">kolm</span></a>
    <nav><a class="chip" href="/account/dashboard" style="text-decoration:none">dashboard</a> <a class="chip" href="/account/overview" style="text-decoration:none">overview</a> <a class="chip" href="/account/org" style="text-decoration:none">team</a> <a class="chip" href="/account/api-control-center" style="text-decoration:none">API control</a></nav>
  </div>
  <div id="banner"></div>
  <main id="main" data-testid="train-root"></main>
</div>
<script>
(function(){
  'use strict';
  var KEY = null;
  try { KEY = sessionStorage.getItem('kolm_account_key') || sessionStorage.getItem('kolm_dash_key') || null; } catch(e) {}
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function headers(extra){ var h = extra ? Object.assign({}, extra) : {}; h.Accept='application/json'; if (KEY) h.Authorization = 'Bearer ' + KEY; return h; }
  function num(n){ return (typeof n==='number' && isFinite(n)) ? n.toLocaleString() : '0'; }
  function fk(n){ return (typeof n==='number' && isFinite(n)) ? n.toFixed(3) : '-'; }

  var STATE = { namespace:'default', preview:null, namespaces:[], jobActive:false };

  function showAuth(message){
    document.getElementById('main').innerHTML =
      '<div class="authbox panel">'
      + '<p class="eyebrow">Train</p>'
      + '<h2 class="section-title" style="margin-top:0">Paste your workspace API key</h2>'
      + '<p class="muted">' + esc(message || 'See your captures, inspect the holdout split, read the K-score delta, and start a distill. The key stays on your device.') + '</p>'
      + '<input id="keyin" type="password" placeholder="ks_..." autocomplete="off" data-testid="key-input">'
      + '<button class="btn btn--primary" id="keybtn" data-testid="key-submit">Load my data</button>'
      + '</div>';
    document.getElementById('keybtn').onclick = function(){
      var v = (document.getElementById('keyin').value || '').trim();
      if (!v) return;
      try { sessionStorage.setItem('kolm_account_key', v); } catch(e) {}
      KEY = v; load();
    };
  }

  function metric(label, value, testid){ return '<div class="panel metric"><span>'+esc(label)+'</span><b data-testid="'+esc(testid||('m-'+label.toLowerCase().replace(/[^a-z0-9]+/g,'-')))+'">'+esc(value)+'</b></div>'; }
  function banner(msg, kind){ document.getElementById('banner').innerHTML = '<div class="banner'+(kind?(' '+kind):'')+'" data-testid="train-banner">'+esc(msg)+'</div>'; }

  // ---- planDataBudget sparkline. The preview envelope carries a
  // planDataBudget (a.k.a. plan_data_budget / data_budget) block:
  //   { basis, required_examples, pairs_remaining, marginal_dk_per_row,
  //     curve:[{n,k_hat}], target_k, current_n, expected_k_at_current }.
  // basis==='insufficient' => show the ">= 4 observations" hint, no chart.
  function pickDataBudget(pv){
    if (!pv) return null;
    return pv.planDataBudget || pv.plan_data_budget || pv.data_budget || (pv.data && (pv.data.planDataBudget || pv.data.plan_data_budget || pv.data.data_budget)) || null;
  }
  function sparkline(curve, targetK){
    var pts = (curve||[]).filter(function(p){ return p && isFinite(p.n) && isFinite(p.k_hat); });
    if (pts.length < 2) return '';
    var W=320, H=64, pad=4;
    var ns = pts.map(function(p){ return p.n; }), ks = pts.map(function(p){ return p.k_hat; });
    var nMin=Math.min.apply(null,ns), nMax=Math.max.apply(null,ns);
    var kMin=Math.min.apply(null,ks.concat(targetK!=null?[targetK]:[])), kMax=Math.max.apply(null,ks.concat(targetK!=null?[targetK]:[]));
    if (nMax===nMin) nMax=nMin+1; if (kMax===kMin) kMax=kMin+0.001;
    function x(n){ return pad + (n-nMin)/(nMax-nMin)*(W-2*pad); }
    function y(k){ return H-pad - (k-kMin)/(kMax-kMin)*(H-2*pad); }
    var d = pts.map(function(p,i){ return (i?'L':'M')+x(p.n).toFixed(1)+' '+y(p.k_hat).toFixed(1); }).join(' ');
    var area = 'M'+x(pts[0].n).toFixed(1)+' '+(H-pad)+' '+pts.map(function(p){ return 'L'+x(p.n).toFixed(1)+' '+y(p.k_hat).toFixed(1); }).join(' ')+' L'+x(pts[pts.length-1].n).toFixed(1)+' '+(H-pad)+' Z';
    var tgt = (targetK!=null) ? '<line class="tgt" x1="'+pad+'" y1="'+y(targetK).toFixed(1)+'" x2="'+(W-pad)+'" y2="'+y(targetK).toFixed(1)+'"></line>' : '';
    var last = pts[pts.length-1];
    return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" role="img" aria-label="K-score versus rows" data-testid="spark">'
      + '<path class="area" d="'+area+'"></path>'+tgt+'<path class="line" d="'+d+'"></path>'
      + '<circle cx="'+x(last.n).toFixed(1)+'" cy="'+y(last.k_hat).toFixed(1)+'" r="2.4"></circle></svg>';
  }
  function renderDataBudget(){
    var pv = STATE.preview || {};
    var db = pickDataBudget(pv);
    var html = '<div class="panel" data-testid="panel-databudget"><p class="eyebrow">Data budget</p><h3 class="section-title" style="margin:2px 0 8px;font-size:18px">K-score vs rows</h3>';
    if (!db || db.basis === 'insufficient' || !Array.isArray(db.curve) || db.curve.length < 2){
      var npts = db && (db.n_points!=null) ? db.n_points : 0;
      html += '<p class="muted" data-testid="databudget-insufficient">Need at least 4 measured (rows, K-score) observations for this namespace before we can fit the scaling curve. '
        + (npts ? 'Currently '+esc(num(npts))+' on file.' : '')
        + ' Keep capturing - or run a small distill to record the first anchors.</p></div>';
      return html;
    }
    var req = db.required_examples, rem = db.pairs_remaining, mdk = db.marginal_dk_per_row, tgt = db.target_k;
    html += sparkline(db.curve, tgt);
    html += '<div class="row" style="border:0;padding:6px 0 0"><span class="muted">Required examples</span><span class="mono">'+esc(req!=null?num(req):'unbounded')+'</span></div>';
    html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Pairs remaining</span><span class="mono">'+esc(rem!=null?num(rem):'-')+'</span></div>';
    html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Marginal dK / row</span><span class="mono">'+esc(mdk!=null?Number(mdk).toExponential(2):'-')+'</span></div>';
    // capture ~N more pairs for +X K-score callout.
    if (rem!=null && rem>0 && mdk!=null){
      var batch = Math.min(rem, 1000);
      var gain = batch * Number(mdk);
      html += '<p class="callout" data-testid="databudget-callout">Capture ~<b>'+esc(num(batch))+'</b> more pairs for about <b>+'+esc(gain.toFixed(3))+'</b> K-score'
        + (tgt!=null?' toward the '+esc(fk(tgt))+' target':'') + '.</p>';
    } else if (rem===0){
      html += '<p class="callout" data-testid="databudget-callout">You already have enough pairs to hit the '+esc(fk(tgt))+' target. Start a distill below.</p>';
    }
    html += '</div>';
    return html;
  }

  function renderHoldout(){
    var pv = STATE.preview || {};
    // The preview / job envelopes surface the fail-closed disjointness + row-hash
    // checks. Accept several shapes; default to a "computed at compile" note.
    var sp = pv.split || pv.holdout || (pv.data && (pv.data.split || pv.data.holdout)) || {};
    var lk = pv.leakageReport || pv.leakage_report || pv.leakage || (pv.data && (pv.data.leakageReport || pv.data.leakage)) || {};
    var trainN = sp.train_n != null ? sp.train_n : sp.train;
    var holdN = sp.holdout_n != null ? sp.holdout_n : sp.holdout;
    var disjoint = (lk.disjoint != null) ? lk.disjoint : (lk.leaked === 0 || lk.overlap === 0 ? true : (lk.leaked || lk.overlap) ? false : null);
    var leaked = lk.leaked != null ? lk.leaked : (lk.overlap != null ? lk.overlap : null);
    var html = '<div class="panel" data-testid="panel-holdout"><p class="eyebrow">Holdout</p><h3 class="section-title" style="margin:2px 0 8px;font-size:18px">Holdout split &amp; leakage</h3>';
    if (trainN==null && holdN==null && disjoint==null){
      html += '<p class="muted">The fail-closed holdout split and row-hash leakage check run when you compile. The K-score below is measured on the held-out rows, never on rows the model trained on.</p>';
    } else {
      if (trainN!=null) html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Train rows</span><span class="mono">'+esc(num(trainN))+'</span></div>';
      if (holdN!=null) html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Holdout rows</span><span class="mono">'+esc(num(holdN))+'</span></div>';
      if (leaked!=null) html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Leaked rows</span><span class="mono">'+esc(num(leaked))+'</span></div>';
      html += '<div class="row" style="border:0;padding:6px 0 0"><span class="muted">Disjointness</span>'
        + (disjoint===true ? '<span class="chip ok" data-testid="holdout-disjoint">disjoint - pass</span>'
          : disjoint===false ? '<span class="chip bad" data-testid="holdout-disjoint">leakage detected - blocked</span>'
          : '<span class="chip">computed at compile</span>') + '</div>';
    }
    html += '<p class="muted" style="margin:10px 0 0;font-size:12px">Holdout disjointness is fail-closed: a leak blocks promotion. Signed .kolm artifacts and the K-score gate are never weakened.</p></div>';
    return html;
  }

  function renderKDelta(){
    var pv = STATE.preview || {};
    var ev = pv.evalGate || pv.eval_gate || pv.regression || (pv.data && (pv.data.evalGate || pv.data.eval_gate)) || {};
    var cand = ev.candidate_k != null ? ev.candidate_k : (ev.candidate != null ? ev.candidate : null);
    var prior = ev.prior_k != null ? ev.prior_k : (ev.baseline != null ? ev.baseline : (ev.prior != null ? ev.prior : null));
    var verdict = ev.verdict || ev.decision || null;
    var html = '<div class="panel" data-testid="panel-kdelta"><p class="eyebrow">K-score delta</p><h3 class="section-title" style="margin:2px 0 8px;font-size:18px">Candidate vs prior</h3>';
    if (cand==null && prior==null){
      html += '<p class="muted">No prior compile to compare against yet. After your first distill, this shows the candidate K-score against the previous artifact and the eval-gate verdict.</p>';
    } else {
      var delta = (cand!=null && prior!=null) ? (cand - prior) : null;
      var dir = delta!=null ? (delta>=0?'up':'down') : '';
      html += '<div class="kdelta"><span class="now">'+esc(fk(cand))+'</span>'
        + (prior!=null ? '<span class="vs">vs prior '+esc(fk(prior))+'</span>' : '')
        + (delta!=null ? '<span class="'+dir+'" data-testid="kdelta-value">'+(delta>=0?'+':'')+esc(delta.toFixed(3))+'</span>' : '') + '</div>';
      if (verdict){
        var pass = /promot|pass|ok|accept/i.test(verdict);
        html += '<div class="row" style="border:0;padding:8px 0 0"><span class="muted">Eval gate</span><span class="chip '+(pass?'ok':'bad')+'" data-testid="kdelta-verdict">'+esc(verdict)+'</span></div>';
      }
    }
    html += '</div>';
    return html;
  }

  function renderCurate(){
    var pv = STATE.preview || {};
    var cur = pv.curation || pv.curate || (pv.data && (pv.data.curation || pv.data.curate)) || {};
    var nd = cur.near_dup != null ? cur.near_dup : cur.near_duplicates;
    var sem = cur.semantic != null ? cur.semantic : cur.semantic_dup;
    var ql = cur.quality != null ? cur.quality : cur.low_quality;
    var html = '<div class="panel" data-testid="panel-curate"><p class="eyebrow">Curation</p><h3 class="section-title" style="margin:2px 0 8px;font-size:18px">What got filtered</h3>';
    if (nd==null && sem==null && ql==null){
      html += '<p class="muted">Curation stats (near-duplicate, semantic, and low-quality rows removed) appear here once a distill runs the curation stage.</p>';
    } else {
      if (nd!=null) html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Near-duplicate removed</span><span class="mono">'+esc(num(nd))+'</span></div>';
      if (sem!=null) html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Semantic-duplicate removed</span><span class="mono">'+esc(num(sem))+'</span></div>';
      if (ql!=null) html += '<div class="row" style="border:0;padding:2px 0"><span class="muted">Low-quality removed</span><span class="mono">'+esc(num(ql))+'</span></div>';
    }
    html += '</div>';
    return html;
  }

  function render(){
    var pv = STATE.preview || {};
    var total = pv.total_captures != null ? pv.total_captures : 0;
    var clusters = pv.top_clusters || [];
    var nsOptions = (STATE.namespaces.length ? STATE.namespaces : [STATE.namespace]).map(function(n){
      return '<option value="'+esc(n)+'"'+(n===STATE.namespace?' selected':'')+'>'+esc(n)+'</option>';
    }).join('');

    var html = '';
    html += '<div class="grid"><div class="panel hero" data-testid="hero-train">'
      + '<p class="eyebrow">Train &middot; namespace ' + esc(STATE.namespace) + '</p>'
      + '<b>' + esc(num(total)) + '</b>'
      + '<p class="muted">captured pairs in this namespace &middot; ' + (pv.specialist_eligible ? 'specialist-eligible' : pv.recipe_eligible ? 'recipe-eligible' : 'keep capturing') + '</p>'
      + '</div></div>';

    // dataset / namespace controls + Train.
    html += '<div class="panel" data-testid="panel-controls" style="margin-top:14px"><div class="controls">'
      + '<select class="fld" id="nsSel" aria-label="Namespace">'+nsOptions+'</select>'
      + '<input class="fld" id="targetSize" value="phi-3-mini" aria-label="Target size" title="Target model size">'
      + '<div style="display:flex;gap:8px"><button class="btn btn--primary" id="trainBtn" data-testid="train-btn">Train (distill)</button><button class="btn btn--sm" id="compileBtn" data-testid="compile-btn" title="Stream a real compile with live K-score">Compile (live)</button></div>'
      + '</div>'
      + '<p class="muted" style="margin:10px 0 0;font-size:12px">Distill needs ~1,000 captured pairs in a namespace. The compile path streams real holdout K-score from the live pipeline - never a placeholder.</p>'
      + '</div>';

    html += '<div class="grid metrics" style="margin-top:14px">'
      + metric('Captured pairs', num(total), 'm-captured-pairs')
      + metric('Clusters', num(clusters.length))
      + metric('Mode', pv.mode_hint || 'recipe')
      + metric('Eligible', pv.specialist_eligible ? 'specialist' : pv.recipe_eligible ? 'recipe' : 'no')
      + '</div>';

    html += '<div class="grid cols2" style="margin-top:14px">';
    html += renderDataBudget();
    html += renderHoldout();
    html += '</div>';

    html += '<div class="grid cols2" style="margin-top:14px">';
    html += renderKDelta();
    html += renderCurate();
    html += '</div>';

    // clusters (dataset view).
    html += '<h2 class="section-title">Top capture clusters</h2><div class="panel" data-testid="panel-clusters">';
    if (clusters.length){
      html += clusters.map(function(c){ return '<div class="row"><span class="mono">'+esc(c.template_hash||'untagged')+'</span><span class="chip">'+esc(num(c.count))+'</span></div>'; }).join('');
    } else {
      html += '<p class="muted">No clusters yet. Point traffic at this namespace with <span class="mono">POST /v1/route/chat/completions</span> first.</p>';
    }
    html += '</div>';

    // live progress region.
    html += '<h2 class="section-title">Live run</h2><div class="panel" id="runPanel" data-testid="panel-run"><p class="muted">Start a distill or compile above to watch real progress here.</p></div>';

    document.getElementById('main').innerHTML = html;
    wire();
  }

  function wire(){
    var nsSel = document.getElementById('nsSel');
    if (nsSel) nsSel.addEventListener('change', function(){ STATE.namespace = nsSel.value; loadPreview().then(render); });
    var tb = document.getElementById('trainBtn');
    if (tb) tb.addEventListener('click', startDistill);
    var cb = document.getElementById('compileBtn');
    if (cb) cb.addEventListener('click', startCompile);
  }

  function runPanel(){ return document.getElementById('runPanel'); }
  function renderSteps(steps, extra){
    var html = '<div class="steps" data-testid="run-steps">' + (steps||[]).map(function(s){
      return '<div class="step" data-status="'+esc(s.status||'pending')+'" data-step="'+esc(s.id||'')+'"><span class="nm">'+esc(s.label||s.id||'step')+'</span><span class="st">'+esc(s.status||'pending')+(s.k_score!=null?' / K '+fk(s.k_score):'')+'</span></div>';
    }).join('') + '</div>';
    if (extra) html += extra;
    runPanel().innerHTML = html;
  }

  // ---- Distill path: POST /v1/specialists/auto-distill, then poll /v1/jobs/:id.
  function startDistill(){
    if (STATE.jobActive) return;
    STATE.jobActive = true;
    var btn = document.getElementById('trainBtn'); if (btn){ btn.disabled = true; btn.textContent = 'Starting...'; }
    var targetSize = (document.getElementById('targetSize')||{}).value || 'phi-3-mini';
    runPanel().innerHTML = '<p class="muted">Enqueuing distill job for <span class="mono">'+esc(STATE.namespace)+'</span>...</p>';
    fetch('/v1/specialists/auto-distill', { method:'POST', credentials:'same-origin', headers: headers({ 'content-type':'application/json' }), body: JSON.stringify({ namespace: STATE.namespace, target_size: targetSize }) })
      .then(function(res){ return res.json().then(function(j){ return { ok:res.ok, status:res.status, body:j }; }); })
      .then(function(o){
        if (o.status === 400 && o.body && o.body.count != null){
          runPanel().innerHTML = '<div class="banner warn">'+esc(o.body.message || ('Need '+(o.body.threshold||1000)+' pairs; have '+o.body.count+'.'))+'</div>';
          return done();
        }
        if (o.status === 503){
          runPanel().innerHTML = '<div class="banner warn">'+esc((o.body && (o.body.detail||o.body.error)) || 'Trainer not configured.')+(o.body && o.body.hint ? '<br><span class="mono" style="font-size:11px">'+esc(o.body.hint)+'</span>' : '')+'</div>';
          return done();
        }
        if (!o.ok || !o.body || !o.body.job_id){
          runPanel().innerHTML = '<div class="banner warn">'+esc((o.body && (o.body.message||o.body.error)) || 'Could not start the distill.')+'</div>';
          return done();
        }
        banner('Distill job '+o.body.job_id+' started ('+(o.body.bridge_source||'worker')+').');
        pollJob(o.body.poll_url || o.body.status_url || ('/v1/jobs/'+o.body.job_id), o.body.job_id);
      })
      .catch(function(){ runPanel().innerHTML = '<div class="banner warn">Network error starting the distill.</div>'; done(); });
  }

  function pollJob(url, jobId){
    var tries = 0;
    function tick(){
      fetch(url, { credentials:'same-origin', headers: headers() })
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(j){
          tries++;
          if (!j){ if (tries < 4) return setTimeout(tick, 1500); runPanel().innerHTML += '<p class="muted">Job '+esc(jobId)+' not readable yet.</p>'; return done(); }
          var status = j.status || 'running';
          var kscore = (j.k_score != null) ? j.k_score : (j.metrics && j.metrics.k_score);
          var steps = [{ id:'distill', label:'Distill '+esc(j.namespace||STATE.namespace), status: (status==='completed'||status==='done')?'done':(status==='failed'||status==='error')?'error':'running', k_score: kscore }];
          var tail = j.log_tail ? '<pre data-testid="run-log">'+esc(j.log_tail)+'</pre>' : '';
          renderSteps(steps, tail);
          if (status==='completed' || status==='done'){ banner('Distill complete'+(kscore!=null?' - K '+fk(kscore):'')+'.'); return done(); }
          if (status==='failed' || status==='error'){ banner('Distill failed.', 'warn'); return done(); }
          if (tries < 400) setTimeout(tick, 2000); else done();
        })
        .catch(function(){ if (tries < 4) setTimeout(tick, 2000); else done(); });
    }
    tick();
  }

  // ---- Compile path: POST /v1/compile, then EventSource on the real SSE
  // stream. Steps render from the 'hello' event; live k_score from 'metric'.
  function startCompile(){
    if (STATE.jobActive) return;
    STATE.jobActive = true;
    var btn = document.getElementById('compileBtn'); if (btn) btn.disabled = true;
    runPanel().innerHTML = '<p class="muted">Starting compile for <span class="mono">'+esc(STATE.namespace)+'</span>...</p>';
    fetch('/v1/compile', { method:'POST', credentials:'same-origin', headers: headers({ 'content-type':'application/json' }), body: JSON.stringify({ task: 'distill namespace '+STATE.namespace, corpus_namespace: STATE.namespace }) })
      .then(function(res){ return res.json().then(function(j){ return { ok:res.ok, status:res.status, body:j }; }); })
      .then(function(o){
        var streamUrl = o.body && (o.body.stream_url || (o.body.job ? '/v1/compile/stream/'+o.body.job : null));
        if (!o.ok || !streamUrl){
          runPanel().innerHTML = '<div class="banner warn">'+esc((o.body && (o.body.error||o.body.message)) || 'Could not start the compile.')+'</div>';
          return done();
        }
        streamCompile(streamUrl);
      })
      .catch(function(){ runPanel().innerHTML = '<div class="banner warn">Network error starting the compile.</div>'; done(); });
  }

  function streamCompile(url){
    // EventSource cannot send Authorization headers, so the same-origin session
    // cookie carries auth. Pass the key as a query param fallback when present.
    var src;
    try { src = new EventSource(url + (KEY ? (url.indexOf('?')<0?'?':'&')+'key='+encodeURIComponent(KEY) : ''), { withCredentials: true }); }
    catch(e){ runPanel().innerHTML = '<div class="banner warn">This browser blocked the live stream. The job is still running - check the dashboard.</div>'; return done(); }
    var steps = [];
    src.addEventListener('hello', function(ev){
      try { var d = JSON.parse(ev.data); steps = (d.steps||[]).map(function(s){ return { id:s.id, label:s.label, status:s.status||'pending' }; }); renderSteps(steps); } catch(e){}
    });
    src.addEventListener('step', function(ev){
      try { var d = JSON.parse(ev.data); var s = steps.find(function(x){ return x.id===d.id; }); if (s){ s.status = d.status || s.status; renderSteps(steps); } } catch(e){}
    });
    src.addEventListener('metric', function(ev){
      try { var d = JSON.parse(ev.data); var s = steps.find(function(x){ return x.id===d.step; }); if (s){ s.k_score = d.k_score; renderSteps(steps); } } catch(e){}
    });
    src.addEventListener('done', function(ev){
      try { var d = JSON.parse(ev.data); banner('Compile done'+(d.k_score!=null?' - K '+fk(d.k_score):'')+'.'); } catch(e){}
      steps.forEach(function(s){ if (s.status!=='error') s.status='done'; }); renderSteps(steps);
      src.close(); done();
    });
    src.addEventListener('error', function(ev){
      var msg = 'stream interrupted';
      try { if (ev && ev.data){ var d = JSON.parse(ev.data); msg = d.error || d.message || msg; } } catch(e){}
      // A closed connection after 'done' also fires error; only surface if no done seen.
      if (STATE.jobActive){ runPanel().innerHTML += '<p class="muted">'+esc(msg)+'</p>'; src.close(); done(); }
    });
  }

  function done(){
    STATE.jobActive = false;
    var tb = document.getElementById('trainBtn'); if (tb){ tb.disabled = false; tb.textContent = 'Train (distill)'; }
    var cb = document.getElementById('compileBtn'); if (cb) cb.disabled = false;
  }

  function loadPreview(){
    return fetch('/v1/distill/from-captures/preview?namespace='+encodeURIComponent(STATE.namespace), { credentials:'same-origin', headers: headers() })
      .then(function(r){ if (r.status===401) return { _auth:false }; return r.json().then(function(j){ return { _auth:true, status:r.status, body:j }; }); })
      .then(function(o){
        if (o && o._auth === false){ showAuth('That key was rejected or expired. Paste a current workspace key.'); STATE.preview = null; return; }
        if (o.status === 503){ STATE.preview = {}; banner((o.body && (o.body.message||o.body.error)) || 'Capture store unavailable right now.', 'warn'); return; }
        STATE.preview = (o.status===200) ? o.body : {};
      })
      .catch(function(){ STATE.preview = {}; });
  }

  function loadNamespaces(){
    return fetch('/v1/account/compiler-overview', { credentials:'same-origin', headers: headers() })
      .then(function(r){ return r.status===200 ? r.json() : null; })
      .then(function(j){ if (j && Array.isArray(j.namespaces) && j.namespaces.length){ STATE.namespaces = j.namespaces; if (STATE.namespaces.indexOf(STATE.namespace)<0) STATE.namespace = STATE.namespaces[0]; } })
      .catch(function(){});
  }

  function load(){
    document.getElementById('main').innerHTML = '<div class="banner">Loading your captures...</div>';
    loadNamespaces().then(loadPreview).then(function(){ if (STATE.preview !== null) render(); });
  }

  if (KEY) load(); else showAuth();
})();
</script>
</body>
</html>
