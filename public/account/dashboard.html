<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Dashboard - kolm.ai</title>
<meta name="description" content="Your live workspace: exact calls captured, API keys, recent compile jobs, and plan usage.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#08090A">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/kolm-2026.css">
<style>
  /* W-4b account dashboard. Colors come only from kolm-2026.css system tokens
     (--room page floor, --ink, --accent, --panel, --line, --font-mono). */
  body{background:var(--room);color:var(--ink)}
  body::before,body::after{display:none}
  .mono{font-family:var(--font-mono)}
  .app{max-width:1240px;margin:0 auto;padding:clamp(28px,5vw,58px) max(22px,env(safe-area-inset-right)) 90px max(22px,env(safe-area-inset-left))}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:clamp(28px,5vw,52px)}
  .brandlink{display:inline-flex;align-items:center;gap:9px;min-height:44px;color:var(--ink);text-decoration:none;font-weight:600;letter-spacing:0}
  .eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 6px}
  .section-title{font-size:clamp(20px,3vw,26px);letter-spacing:0;margin:34px 0 14px}
  .grid{display:grid;gap:14px}
  .grid.metrics{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
  .grid.cols2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
  .panel{background:var(--panel,#101314);border:1px solid var(--line,#1d2224);border-radius:14px;padding:18px 20px}
  .hero{grid-column:1/-1;display:flex;flex-direction:column;gap:6px;padding:26px 28px}
  .hero b{font-size:clamp(42px,8vw,72px);line-height:1;letter-spacing:0;font-family:var(--font-mono)}
  .metric span{display:block;font-size:12px;color:var(--ink-mute,#8b9498);margin-bottom:8px;letter-spacing:.02em}
  .metric b{font-size:30px;font-family:var(--font-mono);letter-spacing:0}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line,#1d2224)}
  .row:last-child{border-bottom:0}
  .chip{display:inline-block;font-family:var(--font-mono);font-size:12px;padding:3px 9px;border:1px solid var(--line,#1d2224);border-radius:999px;color:var(--ink-mute,#8b9498)}
  .muted{color:var(--ink-mute,#8b9498)}
  .authbox{max-width:560px;margin:8vh auto;text-align:center}
  .authbox input{width:100%;margin:14px 0;padding:13px 15px;border-radius:11px;border:1px solid var(--line,#1d2224);background:#0c0f10;color:var(--ink);font-family:var(--font-mono)}
  .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:0 18px;border-radius:11px;text-decoration:none;font-weight:600;cursor:pointer;border:1px solid var(--line,#1d2224);background:transparent;color:var(--ink)}
  .btn--primary{background:var(--accent,#3FE5A0);color:#06140d;border-color:transparent}
  .banner{border:1px solid var(--line,#1d2224);border-radius:11px;padding:12px 15px;margin-bottom:16px}
  pre{background:#0c0f10;border:1px solid var(--line,#1d2224);border-radius:11px;padding:14px;overflow:auto;font-size:12.5px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <a class="brandlink" href="/"><span class="mono">kolm</span></a>
    <nav><a class="chip" href="/account/overview" style="text-decoration:none">overview</a> <a class="chip" href="/account/train" style="text-decoration:none">train</a> <a class="chip" href="/account/org" style="text-decoration:none">team</a> <a class="chip" href="/account/api-control-center" style="text-decoration:none">API control</a></nav>
  </div>
  <div id="banner"></div>
  <main id="main" data-testid="dashboard-root"></main>
</div>
<script>
(function(){
  'use strict';
  var KEY = null;
  try { KEY = sessionStorage.getItem('kolm_account_key') || sessionStorage.getItem('kolm_dash_key') || null; } catch(e) {}
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  // Key-recovery confirmation. The recovery flow redirects to
  // /account/dashboard?recovered=1 once a new workspace key has been issued and
  // the session re-established; surface a clear, one-time confirmation so the
  // user knows their old key is now rotated out.
  (function(){
    try {
      var p = new URLSearchParams(window.location.search);
      if (p.get('recovered') === '1') {
        document.getElementById('banner').innerHTML =
          '<div class="banner" data-testid="recovered-banner" style="border-color:var(--accent,#3FE5A0)">'
          + 'Your workspace key was recovered. The previous key is now rotated out - update any stored copies with the key shown on the recovery screen.'
          + '</div>';
        try { p.delete('recovered'); var qs = p.toString(); history.replaceState(null, '', window.location.pathname + (qs ? '?' + qs : '')); } catch(e) {}
      }
    } catch(e) {}
  })();
  function headers(){ var h = {'Accept':'application/json'}; if (KEY) h.Authorization = 'Bearer ' + KEY; return h; }
  function num(n){ return (typeof n==='number' && isFinite(n)) ? n.toLocaleString() : '0'; }

  function showAuth(message){
    document.getElementById('main').innerHTML =
      '<div class="authbox panel">'
      + '<p class="eyebrow">Dashboard</p>'
      + '<h2 class="section-title" style="margin-top:0">Paste your workspace API key</h2>'
      + '<p class="muted">' + esc(message || 'Your live captures, keys, jobs, and usage load here. The key stays on your device.') + '</p>'
      + '<input id="keyin" type="password" placeholder="ks_..." autocomplete="off" data-testid="key-input">'
      + '<button class="btn btn--primary" id="keybtn" data-testid="key-submit">Load my dashboard</button>'
      + '</div>';
    document.getElementById('keybtn').onclick = function(){
      var v = (document.getElementById('keyin').value || '').trim();
      if (!v) return;
      try { sessionStorage.setItem('kolm_account_key', v); } catch(e) {}
      KEY = v; load();
    };
  }

  function metric(label, value){ return '<div class="panel metric"><span>'+esc(label)+'</span><b data-testid="m-'+esc(label.toLowerCase().replace(/[^a-z0-9]+/g,'-'))+'">'+esc(value)+'</b></div>'; }

  function render(ov, keys){
    var c = (ov && ov.counts) || {};
    var t = (ov && ov.tenant) || {};
    var ct = c.capture_tables || {};
    var jobs = (ov && ov.recent_compile_jobs) || [];
    var used = t.used || 0, quota = t.quota || 0;
    var html = '';

    // (A) Hero - the EXACT captured count (W-5 pt1 fix powers this).
    html += '<div class="grid"><div class="panel hero" data-testid="hero-captures">'
      + '<p class="eyebrow">Calls captured (exact)</p>'
      + '<b>' + num(c.observed_captures || 0) + '</b>'
      + '<p class="muted">workspace <span class="mono">'+esc(t.name||'')+'</span> / plan <span class="mono">'+esc(t.plan||'free')+'</span></p>'
      + '</div></div>';

    // (B) Metrics row.
    html += '<div class="grid metrics" style="margin-top:14px">'
      + metric('Captured', num(c.observed_captures||0))
      + metric('Compile jobs', num(c.compile_jobs||0))
      + metric('Artifacts', num(c.artifacts||0))
      + metric('Namespaces', num(c.namespaces||0))
      + '</div>';

    html += '<div class="grid cols2" style="margin-top:14px">';

    // (C) API keys.
    var keyRows = (keys && keys.keys ? keys.keys : []);
    html += '<div class="panel" data-testid="panel-keys"><p class="eyebrow">API keys</p><h3 class="section-title" style="margin:2px 0 10px;font-size:18px">Provider keys</h3>';
    if (keyRows.length){
      html += keyRows.map(function(k){ return '<div class="row"><span class="mono">'+esc(k.provider||'?')+'</span><span class="chip">'+esc(k.key_prefix||k.scope||'stored')+'</span></div>'; }).join('');
    } else {
      html += '<p class="muted">No provider keys stored yet. Add one in <a href="/account/api-control-center">API control</a>
        <a href="/studio">Distill Studio</a> and your traffic routes on your own key.</p>';
    }
    html += '</div>';

    // (D) Plan + usage ledger.
    var pct = quota ? Math.min(100, Math.round(used/quota*100)) : 0;
    html += '<div class="panel" data-testid="panel-usage"><p class="eyebrow">Usage</p><h3 class="section-title" style="margin:2px 0 10px;font-size:18px">Plan &amp; quota</h3>'
      + '<div class="row"><span class="muted">Plan</span><span class="mono">'+esc(t.plan||'free')+'</span></div>'
      + '<div class="row"><span class="muted">Used</span><span class="mono">'+num(used)+' / '+num(quota)+'</span></div>'
      + '<div class="row"><span class="muted">Remaining</span><span class="mono">'+num(Math.max(0,quota-used))+' ('+(100-pct)+'%)</span></div>'
      + '</div>';

    html += '</div>'; // cols2

    // Capture-source breakdown (proves the count is real, not telemetry).
    html += '<h2 class="section-title">Capture sources</h2><div class="panel" data-testid="panel-sources">'
      + Object.keys(ct).map(function(k){ return '<div class="row"><span class="mono">'+esc(k)+'</span><span class="chip">'+num(ct[k])+'</span></div>'; }).join('')
      + '</div>';

    // Recent compile jobs feed.
    html += '<h2 class="section-title">Recent compile jobs</h2><div class="panel" data-testid="panel-jobs">';
    if (jobs.length){
      html += jobs.map(function(j){ return '<div class="row"><span>'+esc(j.task||j.id||'compile job')+'</span><span class="chip">'+esc(j.status||'queued')+'</span></div>'; }).join('');
    } else {
      html += '<p class="muted">No compile jobs yet. Run <span class="mono">kolm compile</span> or the no-code wizard to create one.</p>';
    }
    html += '</div>';

    document.getElementById('main').innerHTML = html;
  }

  function load(){
    Promise.all([
      fetch('/v1/account/compiler-overview', { credentials:'same-origin', headers: headers() }).then(function(r){ return { status:r.status, body: r.status===200 ? r.json() : null }; }),
      fetch('/v1/account/provider-keys', { credentials:'same-origin', headers: headers() }).then(function(r){ return r.status===200 ? r.json() : { keys: [] }; }).catch(function(){ return { keys: [] }; })
    ]).then(function(res){
      var ov = res[0];
      if (ov.status === 401) { showAuth('That key was rejected or expired. Paste a current workspace key.'); return; }
      if (ov.status !== 200 || !ov.body) { document.getElementById('banner').innerHTML = '<div class="banner">Could not load your workspace just now.</div>'; return; }
      Promise.resolve(ov.body).then(function(body){ render(body, res[1]); });
    }).catch(function(e){ document.getElementById('banner').innerHTML = '<div class="banner">Network error: '+esc(e&&e.message)+'</div>'; });
  }

  if (KEY) load(); else showAuth();
})();
</script>
</body>
</html>
