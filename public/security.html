  <!-- s-register-grid — hosted controls -->
  <section class="section" id="sec-hosted">
    <div class="wrap wrap--wide">
      <div class="section__head">
        <p class="eyebrow">02 / HOSTED CONTROLS</p>
        <h2>The public app ships with browser and transport guardrails by default.</h2>
        <p class="lede">These are current web-app controls in the Express and Vercel configuration. They do not replace formal certification; they reduce obvious browser, framing, content-type, and permission risk.</p>
      </div>
      <div class="grid grid--3">
        <div class="card reveal" data-state="ok"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Enforced control">
            <rect class="face" x="15" y="15" width="10" height="10" rx="1.5"/>
            <rect stroke x="15" y="15" width="10" height="10" rx="1.5"/>
            <path stroke d="M20 15V6M20 25v9M15 20H6M25 20h9"/>
            <path class="gleam" d="M17.5 20l2 2 3.5-4" stroke="currentColor"/>
          </svg>
          <span class="card__k">REG &middot; CSP</span>
          <h3>Default-src self</h3>
          <p>Scripts, styles, images, fonts, connections, frames, base URI, and form actions are constrained through the configured CSP for the hosted site.</p>
          <p class="sec-why"><b>Why it matters.</b> CSP (Content Security Policy) is a browser rule that lists which origins a page may load code from. If an attacker injects a tag pointing at their server, the browser refuses to run it.<span class="sec-eg">e.g. &lt;script src="evil.example/x.js"&gt; is blocked before it executes</span></p>
        </div>
        <div class="card reveal" data-state="ok"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Enforced control">
            <rect class="face" x="15" y="15" width="10" height="10" rx="1.5"/>
            <rect stroke x="15" y="15" width="10" height="10" rx="1.5"/>
            <path stroke d="M20 15V6M20 25v9M15 20H6M25 20h9"/>
            <path class="gleam" d="M17.5 20l2 2 3.5-4" stroke="currentColor"/>
          </svg>
          <span class="card__k">REG &middot; TRANSPORT</span>
          <h3>Strict Transport Security</h3>
          <p>HSTS is configured with a long max age, includeSubDomains, and preload on the Express path and mirrored in deploy headers.</p>
          <p class="sec-why"><b>Why it matters.</b> HSTS (HTTP Strict Transport Security) tells the browser to only ever reach the site over encrypted HTTPS, even if a link or a network downgrades it to plain HTTP.<span class="sec-eg">e.g. http://kolm.ai is upgraded to https before any byte leaves your machine</span></p>
        </div>
        <div class="card reveal" data-state="ok"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Enforced control">
            <rect class="face" x="15" y="15" width="10" height="10" rx="1.5"/>
            <rect stroke x="15" y="15" width="10" height="10" rx="1.5"/>
            <path stroke d="M20 15V6M20 25v9M15 20H6M25 20h9"/>
            <path class="gleam" d="M17.5 20l2 2 3.5-4" stroke="currentColor"/>
          </svg>
          <span class="card__k">REG &middot; CLICKJACKING</span>
          <h3>Frame ancestors none</h3>
          <p>The CSP and X-Frame-Options deny framing of the public app by default.</p>
          <p class="sec-why"><b>Why it matters.</b> Clickjacking hides the real site inside an invisible frame on an attacker page so a click you think lands on a harmless button actually lands on a sensitive control. Denying framing makes that impossible.<span class="sec-eg">e.g. evil.example cannot embed the control center in a hidden iframe</span></p>
        </div>
        <div class="card reveal" data-state="ok"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Enforced control">
            <rect class="face" x="15" y="15" width="10" height="10" rx="1.5"/>
            <rect stroke x="15" y="15" width="10" height="10" rx="1.5"/>
            <path stroke d="M20 15V6M20 25v9M15 20H6M25 20h9"/>
            <path class="gleam" d="M17.5 20l2 2 3.5-4" stroke="currentColor"/>
          </svg>
          <span class="card__k">REG &middot; CONTENT TYPE</span>
          <h3>Nosniff</h3>
          <p>X-Content-Type-Options prevents MIME sniffing where browsers might otherwise execute mislabeled content.</p>
          <p class="sec-why"><b>Why it matters.</b> MIME sniffing is when a browser guesses a file's type instead of trusting the declared one. An attacker can disguise a script as an image to slip past filters; nosniff forces the browser to honor the declared type.<span class="sec-eg">e.g. a file served as image/png is never run as JavaScript</span></p>
        </div>
        <div class="card reveal" data-state="ok"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Enforced control">
            <rect class="face" x="15" y="15" width="10" height="10" rx="1.5"/>
            <rect stroke x="15" y="15" width="10" height="10" rx="1.5"/>
            <path stroke d="M20 15V6M20 25v9M15 20H6M25 20h9"/>
            <path class="gleam" d="M17.5 20l2 2 3.5-4" stroke="currentColor"/>
          </svg>
          <span class="card__k">REG &middot; REFERRERS</span>
          <h3>Strict origin when cross-origin</h3>
          <p>The referrer policy limits what leaves the site when a user follows an external link.</p>
          <p class="sec-why"><b>Why it matters.</b> The referrer is the address of the page you came from, sent automatically to the next site. A full address can leak a private path or token. This policy sends only the bare origin off-site.<span class="sec-eg">e.g. kolm.ai/trust/abc123 is shared off-site as just kolm.ai</span></p>
        </div>
        <div class="card reveal" data-state="ok"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Enforced control">
            <rect class="face" x="15" y="15" width="10" height="10" rx="1.5"/>
            <rect stroke x="15" y="15" width="10" height="10" rx="1.5"/>
            <path stroke d="M20 15V6M20 25v9M15 20H6M25 20h9"/>
            <path class="gleam" d="M17.5 20l2 2 3.5-4" stroke="currentColor"/>
          </svg>
          <span class="card__k">REG &middot; PERMISSIONS</span>
          <h3>No camera, mic, or geolocation</h3>
          <p>The permissions policy disables sensitive browser capabilities the compiler site does not need.</p>
          <p class="sec-why"><b>Why it matters.</b> A permissions policy is a per-feature allow list the browser enforces. The compiler site never needs your camera, microphone, or location, so those capabilities are switched off outright rather than left to a prompt.<span class="sec-eg">e.g. a camera or location request from this origin is denied automatically</span></p>
        </div>
      </div>
    </div>
  </section>

  <!-- s-surface - attack-surface ownership map + plain-language control notes -->
  <section class="section" id="sec-surface">
    <div class="wrap wrap--wide">
      <div class="section__head">
        <p class="eyebrow">02b / ATTACK SURFACE</p>
        <h2>Who mitigates what, from the attacker to the running model.</h2>
        <p class="lede">Security is shared. The map below follows one path - attacker, supply chain, the kolm boundary, the signed artifact, and your runtime - and marks, with a glyph and a label rather than color alone, where kolm carries the control and where it stays with you.</p>
      </div>
      <div class="kthreat" role="table" aria-label="Attack surface ownership, from attacker to runtime">
        <div class="kthreat__hd" role="row"><span role="columnheader">Surface on the path</span><span role="columnheader">Mitigated by</span></div>
        <div class="kthreat__row" role="row"><span class="kthreat__surface" role="cell"><b>1 &middot; Attacker edits the artifact in transit</b><span>A man-in-the-middle changes a field after kolm signs it. The Ed25519 signature covers the canonical bytes, so a single changed byte fails verification in the buyer's browser.</span></span><span class="kthreat__own kthreat__own--kolm" role="cell">kolm</span></div>
        <div class="kthreat__row" role="row"><span class="kthreat__surface" role="cell"><b>2 &middot; Supply chain forges a kolm-styled report</b><span>An attacker re-signs a fake report with their own key. The published issuer keyring exposes it: the embedded key is not one kolm issues.</span></span><span class="kthreat__own kthreat__own--kolm" role="cell">kolm</span></div>
        <div class="kthreat__row" role="row"><span class="kthreat__surface" role="cell"><b>3 &middot; The kolm boundary itself (capture and compile)</b><span>Inputs enter as governed API events; unknown schemas stay opaque until an adapter manifest declares structure, and policy gates run before dataset, eval, compile, and export.</span></span><span class="kthreat__own kthreat__own--kolm" role="cell">kolm</span></div>
        <div class="kthreat__row" role="row"><span class="kthreat__surface" role="cell"><b>4 &middot; The hosted web app (browser surface)</b><span>The default web controls below (CSP, HSTS, frame denial, nosniff, referrer policy, permissions policy) reduce obvious browser, framing, and content-type risk.</span></span><span class="kthreat__own kthreat__own--kolm" role="cell">kolm</span></div>
        <div class="kthreat__row" role="row"><span class="kthreat__surface" role="cell"><b>5 &middot; The artifact you receive, verified offline</b><span>A buyer checks the signature and issuer in their own browser. There is no kolm server in the trust path, so there is nothing for kolm to quietly return green.</span></span><span class="kthreat__own kthreat__own--you" role="cell">you</span></div>
        <div class="kthreat__row" role="row"><span class="kthreat__surface" role="cell"><b>6 &middot; Your production secrets and key custody</b><span>Your API keys, vault, and rotation policy. kolm only ever holds the public half of its own signing key; your secrets stay on your side.</span></span><span class="kthreat__own kthreat__own--you" role="cell">you</span></div>
        <div class="kthreat__row" role="row"><span class="kthreat__surface" role="cell"><b>7 &middot; Runtime defense of the deployed model</b><span>Live monitoring and incident response for the model once it runs on your hardware. A report describes a moment and a fixed scope, not runtime defense.</span></span><span class="kthreat__own kthreat__own--you" role="cell">you</span></div>
      </div>
      <p class="scope" style="margin-top:var(--s4)">Scope is contractual. Permission posture, redaction and audit-trail integrity are assessed. Injection is tested and reported, not warranted.</p>
    </div>
  </section>

  <!-- s-register-grid — enterprise security model -->
  <section class="section feat feat--rev" id="enterprise">
    <div class="wrap feat__in">
      <div class="feat__copy">
        <p class="eyebrow">03 / ENTERPRISE SECURITY MODEL</p>
        <h2>Security has to be visible to platform, AI, and compliance owners at the same time.</h2>
        <p class="lede">The API control center is the operational security console: it exposes channel coverage, collection modes, export modes, governance stages, policy layers, integration coverage, and unknown-schema behavior.</p>
        <ul class="feat__list">
          <li>Access &middot; API keys, sessions, tenant scope, project boundaries, audit events</li>
          <li>Policy &middot; retention, redaction, vaulting, routing, eval and compile gates</li>
          <li>Observability &middot; capture counters, compile jobs, artifacts, channel matrices</li>
          <li>Exports &middot; governance, SIEM, GRC, warehouse, runtime carry destination context</li>
        </ul>
      </div>
      <div class="feat__ui">
        <div class="plate plate--rows">
          <div class="plate__hd">CONTROL CENTER &middot; <span class="ok">console</span></div>
          <div class="panel__rows">
            <div class="prow"><span class="m">access</span> keys &middot; sessions &middot; tenant scope <span class="prow__r m">control objects</span></div>

            <div class="prow"><span class="m">export</span> SIEM &middot; GRC &middot; warehouse <span class="prow__r a">receipt context</span></div>
          </div>

  <!-- s-listing — certification and package gates -->
  <section class="section" id="gates">
    <div class="wrap wrap--wide">
      <div class="section__head">
        <p class="eyebrow">04 / CERTIFICATION AND PACKAGE GATES</p>
        <h2>Security copy must not outrun the readiness ledger.</h2>
        <p class="lede">Security controls can be described as implemented controls. Formal compliance, package-channel, SDK-release, benchmark, and partner-adoption claims remain gated until the readiness ledger is promoted with evidence.</p>
      </div>
      <div class="grid grid--2">
        <div class="card reveal"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Pending evidence">
            <path class="face" d="M8 14l12-6 12 6-12 6z"/>
            <path stroke d="M8 14l12-6 12 6-12 6zM8 21l12 6 12-6M8 28l12 6 12-6"/>
            <path class="edge gleam" d="M8 14l12-6 12 6"/>
          </svg>
          <span class="card__k">GATE &middot; FORMAL CERTIFICATION</span>
          <h3>Needs live certification</h3>
          <p>SOC 2, ISO 27001, HIPAA, GDPR, FedRAMP, SBOM, and SLSA evidence require a live auditor, certification, or signed attestation artifact before public promotion.</p>
        </div>
        <div class="card reveal"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Pending evidence">
            <path class="face" d="M8 14l12-6 12 6-12 6z"/>
            <path stroke d="M8 14l12-6 12 6-12 6zM8 21l12 6 12-6M8 28l12 6 12-6"/>
            <path class="edge gleam" d="M8 14l12-6 12 6"/>
          </svg>
          <span class="card__k">GATE &middot; PACKAGE CHANNELS</span>
          <h3>Needs package release</h3>
          <p>Installers, SDK packages, browser package metadata, checksums, and release artifacts remain package-release gates until published and verified.</p>
        </div>
        <div class="card reveal"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Pending evidence">
            <path class="face" d="M8 14l12-6 12 6-12 6z"/>
            <path stroke d="M8 14l12-6 12 6-12 6zM8 21l12 6 12-6M8 28l12 6 12-6"/>
            <path class="edge gleam" d="M8 14l12-6 12 6"/>
          </svg>
          <span class="card__k">GATE &middot; BENCHMARK CLAIMS</span>
          <h3>Needs public benchmark data</h3>
          <p>Public leaderboard claims require reproducible public runs, raw JSON, commands, model versions, hardware, latency, cost, and scoring method.</p>
        </div>
        <div class="card reveal"><span class="tick" aria-hidden="true"></span>
          <svg class="card__glyph" viewBox="0 0 40 40" role="img" aria-label="Pending evidence">
            <path class="face" d="M8 14l12-6 12 6-12 6z"/>
            <path stroke d="M8 14l12-6 12 6-12 6zM8 21l12 6 12-6M8 28l12 6 12-6"/>
            <path class="edge gleam" d="M8 14l12-6 12 6"/>
          </svg>
          <span class="card__k">GATE &middot; EXTERNAL ADOPTION</span>
          <h3>Needs external partner</h3>
          <p>Third-party runtime support and neutral stewardship stay unclaimed until outside projects, vendors, or venues publish acceptance evidence.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- s-listing — responsible disclosure -->
  <section class="section feat" id="disclosure">
    <div class="wrap feat__in">
      <div class="feat__copy">
        <p class="eyebrow">05 / RESPONSIBLE DISCLOSURE</p>
        <h2>Report security issues with reproduction steps and impact.</h2>
        <p class="lede">Send hosted-service, API, signing, CLI, evidence-format, or control-plane issues to <a href="mailto:dev@kolm.ai">dev@kolm.ai</a>. Include affected route or object, reproduction steps, expected behavior, actual behavior, and assessed impact.</p>
        <ul class="feat__list">
          <li>Acknowledge &middot; credible reports move into triage with owner and severity</li>
          <li>Contain &middot; focus on the boundary involved, from intake to account control</li>
          <li>Fix &middot; ship a test, audit artifact, or verifier output so it cannot return</li>
          <li>Communicate &middot; affected customers get scoped impact and follow-up evidence</li>
        </ul>
      </div>
      <div class="feat__ui">
        <div class="plate plate--rows">
          <div class="plate__hd">DISCLOSURE FLOW &middot; <span class="ok">dev@kolm.ai</span></div>
          <pre class="well"><span class="ln">01</span> acknowledge credible report      <span class="hdr">triage</span>
<span class="ln">02</span> contain at the boundary           <span class="hdr">scope</span>
<span class="ln">03</span> fix with a regression check       <span class="hdr">test + artifact</span>
<span class="ln">04</span> communicate scoped impact         <span class="hdr">evidence</span></pre>
          <div class="plate__foot"><span class="badge badge--ok">Triaged</span><a class="go" href="mailto:dev@kolm.ai">dev@kolm.ai</a></div>
        </div>
      </div>
    </div>
  </section>
