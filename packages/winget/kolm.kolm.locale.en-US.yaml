Description: |
  kolm compiles a base model + your data + a verifier into a single signed
  .kolm artifact. Every inference emits an HMAC-chained receipt with the
  artifact CID, input hash, output hash, and K-score. Run on your hardware,
  audit months later, replay anywhere.
