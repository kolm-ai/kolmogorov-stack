[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "kolm"
version = "0.1.0"
description = "One-line embed for .kolm artifacts"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [{ name = "Kolmogorov" }]
keywords = ["llm", "lora", "edge", "inference"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Operating System :: OS Independent",
]

dependencies = []

[project.optional-dependencies]
gguf = ["llama-cpp-python>=0.2.90"]
onnx = ["onnxruntime>=1.18"]
transformers = ["transformers>=4.45", "peft>=0.13", "torch>=2.4"]
remote = ["httpx>=0.27"]

[project.urls]
Homepage = "https://kolm.ai"
Source = "https://github.com/kolm-ai/kolm-sdk-python"

[tool.setuptools.packages.find]
include = ["kolm*"]
