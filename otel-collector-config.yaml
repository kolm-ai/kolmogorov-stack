# OpenTelemetry Collector configuration for the kolm gateway bundle.
#
# Minimal pipeline: OTLP (gRPC + HTTP) receivers -> batch processor ->
# debug exporter (writes spans/metrics/logs to collector stdout, viewable
# with `docker logs kolm-otel-collector`).
#
# Swap the `exporters:` block for otlphttp/otlp to forward to a managed
# backend (Honeycomb, Grafana Cloud, Tempo, Loki, etc). See
# https://opentelemetry.io/docs/collector/configuration/ for the full
# schema.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
    send_batch_max_size: 2048
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  debug:
    verbosity: normal
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
  telemetry:
    logs:
      level: info
