# W824-1 — Helm Chart manifest for kolm.ai runtime.
#
# Kubernetes-native deployment for the kolm inference runtime + Cap'n-Capture
# event-store. Pairs with a privately-published `.kolm` artifact pulled from a
# registry by the deployment's initContainer (W824-5).
#
# Install:
#   helm install kolm tools/helm/kolm \
#     --set image.repository=ghcr.io/kolm-ai/kolm \
#     --set image.tag=v1.0.0 \
#     --set artifactRegistry.url=oci://ghcr.io/kolm-ai/artifacts \
#     --set artifactRegistry.secretRef=kolm-registry-pull
#
# Upgrade is rolling (maxSurge=1, maxUnavailable=0, W824-6) so model swaps
# are zero-downtime.

apiVersion: v2
name: kolm
description: kolm.ai inference runtime with .kolm artifact loader, Prometheus metrics, and HPA on inference_queue_depth.
type: application
version: 0.1.0
appVersion: "1.0.0"
keywords:
  - kolm
  - llm
  - inference
  - distillation
  - quantization
home: https://kolm.ai
sources:
  - https://github.com/kolm-ai/kolmogorov-stack
maintainers:
  - name: kolm.ai
    url: https://kolm.ai
