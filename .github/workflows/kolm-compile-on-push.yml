# Reference template — single-step kolm compile via composite action.
#
# TEMPLATE ONLY. The compile job below is guarded by `if: false` so this
# file does NOT consume CI minutes when committed unchanged. Flip the
# guard plus configure the `KOLM_KEY` secret to enable.
#
# Manual dispatch is the only trigger. Add `push: branches: [main]` once
# the secret is configured and the guard is flipped.

name: kolm-compile-template

on:
  workflow_dispatch:
    inputs:
      task:
        description: Task description
        required: true
        default: "summarize a support ticket"

jobs:
  compile:
    name: kolm compile (template)
    runs-on: ubuntu-latest
    # TEMPLATE GUARD: keep `if: false` until the secret is configured.
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: ./.github/actions/kolm-compile
        with:
          task: ${{ github.event.inputs.task || 'summarize a support ticket' }}
          examples: examples/tickets.jsonl
          base: qwen2.5-7b-instruct
          api-key: ${{ secrets.KOLM_KEY }}
          artifact-name: ${{ github.sha }}.kolm
