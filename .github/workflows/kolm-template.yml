# Reference template — kolm/distill-action workflow.
#
# COPY-PASTE TEMPLATE. Every job below is guarded by `if: false` so the
# workflow file renders in the GitHub UI but never consumes CI minutes.
# Downstream kolm users copy this file into their own repo at
# `.github/workflows/kolm.yml`, configure `KOLM_API_KEY`, and flip the
# guard.
#
# Setup (when you are ready to enable)
# ------------------------------------
# 1. Add a `kolm.yaml` at the repo root. Run `kolm yaml init` locally to
#    scaffold one, or copy from `docs/cookbook/kolm.yaml` in the kolm repo.
# 2. Repo Settings -> Secrets and variables -> Actions -> New repository
#    secret named `KOLM_API_KEY` (a `ks_*` tenant key from
#    https://kolm.ai/account/keys).
# 3. Optional: repo variable `KOLM_BASE_URL` for self-hosted kolm installs.
# 4. Change `if: false` on the kolm-gate job below to
#    `if: ${{ secrets.KOLM_API_KEY != '' }}` so the gate runs when the
#    secret is present and skips when absent.

name: kolm-gate-template

# Manual dispatch only by default. Add `push: branches: [main]` and
# `pull_request: branches: [main]` here once the secret is configured
# and the guard is flipped.
on:
  workflow_dispatch:
    inputs:
      force_distill:
        description: 'Re-distill every namespace even if K-Score passes'
        required: false
        default: 'false'

# Top-level permissions default to read-only; the kolm-gate job elevates
# only what it needs (contents:write for release-asset uploads,
# pull-requests:write for the K-Score delta PR comment).
permissions:
  contents: read

jobs:
  kolm-gate:
    name: kolm K-Score gate (template)
    runs-on: ubuntu-latest
    # 5-minute job timeout per spec. A composite action that depends on
    # external network calls should never run indefinitely.
    timeout-minutes: 5
    # TEMPLATE GUARD: keep `if: false` until secret is configured.
    if: false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: K-Score gate via local kolm-distill-action
        id: kolm
        # After publication this becomes `uses: kolm/distill-action@v1`.
        uses: ./tools/gha/kolm-distill-action
        with:
          kolm-api-key: ${{ secrets.KOLM_API_KEY }}
          k-score-gate: '0.85'
          redistill-on-drop: 'true'
          publish-release: 'false'
        env:
          KOLM_BASE_URL: ${{ vars.KOLM_BASE_URL || 'https://kolm.ai' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: fail merge on K-Score regression
        if: steps.kolm.outputs.kscore-passed != 'true'
        run: |
          echo "K-Score below threshold; failing the merge gate."
          echo "Measured K-Score: ${{ steps.kolm.outputs.kscore }}"
          exit 1
