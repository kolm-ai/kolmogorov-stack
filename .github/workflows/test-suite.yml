name: test-suite
on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'cli/**'
      - 'workers/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test-suite.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'cli/**'
      - 'workers/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test-suite.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: run node --test suite
        run: node --test --test-concurrency=1 tests/
