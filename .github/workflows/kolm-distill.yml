# Reference template — kolm.yaml + GitHub Actions distill loop.
#
# TEMPLATE ONLY. Every job below is guarded by `if: false` so the workflow
# file renders in the GitHub UI but never consumes CI minutes. Flip the
# guard to `if: ${{ secrets.KOLM_API_KEY != '' }}` plus configure the
# secret to enable it on a real repo.
#
# Setup (when you are ready to enable)
# ------------------------------------
# 1. Add a repo-root `kolm.yaml` (run `kolm yaml init` locally to scaffold).
# 2. Repo Settings -> Secrets and variables -> Actions -> New repository
#    secret named `KOLM_API_KEY` (a `ks_*` tenant key from
#    https://kolm.ai/account/keys).
# 3. Optional: repo variable `KOLM_BASE_URL` for self-hosted kolm installs.
# 4. Change `if: false` on the kolm-distill job below to
#    `if: ${{ secrets.KOLM_API_KEY != '' }}` so the gate runs when the
#    secret is present and skips when absent.
#
# What it does (once enabled)
# ---------------------------
# On manual dispatch: parse kolm.yaml, replay the most recent captures
# through the active artifact, score them against the gates pinned in
# `kolm.yaml`, and re-distill any namespace that fell below the gate.
# The resulting .kolm artifact is published as a GitHub Release asset
# so downstream consumers can pin to an exact compiled version.

name: kolm-distill-template

# Manual dispatch only by default. Add `push: branches: [main]` here once
# the secret is configured and the guard is flipped.
on:
  workflow_dispatch:
    inputs:
      force_distill:
        description: 'Re-distill every namespace even if K-Score passes'
        required: false
        default: 'false'

jobs:
  kolm-distill:
    name: K-Score gate (template)
    runs-on: ubuntu-latest
    # TEMPLATE GUARD: keep `if: false` until secret is configured. With
    # it set, a fork that imports this workflow file does not start
    # showing red checks on every push.
    if: false
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: setup node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install kolm CLI
        run: npm install -g kolm-stack@latest || npm install -g .

      - name: validate kolm.yaml
        env:
          KOLM_API_KEY: ${{ secrets.KOLM_API_KEY }}
          KOLM_BASE_URL: ${{ vars.KOLM_BASE_URL || 'https://kolm.ai' }}
        run: npx kolm yaml validate --file kolm.yaml --json

      - name: verify K-Score against quality_gates
        id: verify
        env:
          KOLM_API_KEY: ${{ secrets.KOLM_API_KEY }}
          KOLM_BASE_URL: ${{ vars.KOLM_BASE_URL || 'https://kolm.ai' }}
        continue-on-error: true
        run: npx kolm verify --yaml

      - name: re-distill on gate failure
        if: ${{ steps.verify.outcome != 'success' || github.event.inputs.force_distill == 'true' }}
        env:
          KOLM_API_KEY: ${{ secrets.KOLM_API_KEY }}
          KOLM_BASE_URL: ${{ vars.KOLM_BASE_URL || 'https://kolm.ai' }}
        run: npx kolm distill --from-yaml --out ./dist

      - name: publish .kolm artifacts to GitHub Releases
        if: ${{ steps.verify.outcome != 'success' || github.event.inputs.force_distill == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: kolm-distill-${{ github.sha }}
          name: 'kolm distill ${{ github.sha }}'
          body: |
            Auto-distilled by .github/workflows/kolm-distill.yml on push to main.
            Sources: kolm.yaml @ ${{ github.sha }}
            Trigger: K-Score regression vs. quality_gates.min_kscore
          files: dist/*.kolm
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
