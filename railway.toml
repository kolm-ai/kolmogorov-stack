[build]
# Dockerfile builder (not Nixpacks): its entrypoint starts as root, chowns the mounted
# data volume to the `node` user, then drops privileges — fixing the root-owned-volume
# EACCES that blocked persistence (tenants/events/conversations) under Nixpacks (uid 1000).
builder = "DOCKERFILE"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
