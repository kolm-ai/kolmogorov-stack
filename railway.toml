[build]
# Dockerfile builder (not Nixpacks): its entrypoint starts as root, chowns the mounted
# data volume to the `node` user, then drops privileges — fixing the root-owned-volume
# EACCES that blocked persistence (tenants/events/conversations) under Nixpacks (uid 1000).
builder = "DOCKERFILE"

[deploy]
# No startCommand: Railway runs a startCommand as the raw container command, which
# BYPASSES the Dockerfile ENTRYPOINT (the su-exec wrapper) and runs as root. By
# omitting it, the image's ENTRYPOINT (docker-entrypoint.sh: chown volume as root ->
# su-exec node) + CMD (node server.js) run, so the server drops to the node user.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
